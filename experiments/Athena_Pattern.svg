<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      /* THE INK STROKE: Deep Blue-Grey (Less harsh than black) */
      .ink-stroke {
        fill: none;
        stroke: #2c3e50; /* Wet Asphalt / Dark Blue-Grey */
        stroke-width: 12;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      
      /* THE FRIENDLY PALETTE */
      .fill-body { fill: #aabfd4; }   /* Soft Pastel Blue-Grey */
      .fill-wing { fill: #7fa1c4; }   /* Slightly darker Blue */
      .fill-eye  { fill: #fdf5c9; }   /* Pale Creamy Yellow (Not scary orange) */
      .fill-pupil{ fill: #2c3e50; }   /* Matches stroke */
      .fill-beak { fill: #e6b89c; }   /* Soft Peach/Tan */
    </style>
  </defs>

  <g transform="translate(50, 40) scale(0.9)">
  
    <path class="fill-body" d="M130,150 Q120,50 250,50 Q380,50 370,150 Q400,300 350,400 Q250,450 150,400 Q100,300 130,150 Z" />
    <path class="ink-stroke" d="M130,150 Q120,50 250,50 Q380,50 370,150 Q400,300 350,400 Q250,450 150,400 Q100,300 130,150 Z" fill="none"/>

    <path class="ink-stroke" d="M130,100 Q100,80 110,130" />
    <path class="ink-stroke" d="M370,100 Q400,80 390,130" />

    <path class="fill-wing" d="M350,180 Q380,250 340,350 Q320,280 350,180" />
    <path class="ink-stroke" d="M350,180 Q380,250 340,350" fill="none"/>
    <path class="ink-stroke" d="M340,220 Q360,280 330,320" /> <path class="ink-stroke" d="M200,300 Q220,320 240,300" stroke="#ffffff" stroke-width="8" opacity="0.6"/>
    <path class="ink-stroke" d="M260,320 Q280,340 300,320" stroke="#ffffff" stroke-width="8" opacity="0.6"/>
    <path class="ink-stroke" d="M220,350 Q240,370 260,350" stroke="#ffffff" stroke-width="8" opacity="0.6"/>

    <circle class="fill-eye" cx="180" cy="180" r="35" />
    <circle class="ink-stroke" cx="180" cy="180" r="35" />
    
    <circle class="fill-eye" cx="320" cy="180" r="35" />
    <circle class="ink-stroke" cx="320" cy="180" r="35" />
    
    <circle class="fill-pupil" cx="180" cy="180" r="10" />
    <circle class="fill-pupil" cx="320" cy="180" r="10" />

    <path class="fill-beak" d="M250,200 Q230,240 250,260 Q270,240 250,200" />
    <path class="ink-stroke" d="M250,200 Q230,240 250,260 Q270,240 250,200" fill="none"/>

  </g>
</svg>